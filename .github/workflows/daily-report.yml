name: Daily Market Research Report

on:
  schedule:
    # 2:00 AM PST = 9:00 UTC (during PDT)
    - cron: '0 9 * * 1-5'
    # 6:30 AM PST = 13:30 UTC (during PDT) — arrives ~7 AM with GH delay
    - cron: '30 13 * * 1-5'
    # 12:00 PM PST = 19:00 UTC (during PDT) — EOD flash, arrives ~2 PM
    - cron: '0 19 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Which report to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market_open
          - eod_flash
          - all

jobs:
  full-report:
    runs-on: ubuntu-latest
    if: >-
      (github.event.schedule == '0 9 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.report_type == 'full' || github.event.inputs.report_type == 'all'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full market research report
        env:
          FOOL_EMAIL: ${{ secrets.FOOL_EMAIL }}
          FOOL_PASSWORD: ${{ secrets.FOOL_PASSWORD }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
          SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
          SNAPTRADE_USER_ID: ${{ secrets.SNAPTRADE_USER_ID }}
          SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
        run: python main.py

  market-open-report:
    runs-on: ubuntu-latest
    if: >-
      (github.event.schedule == '30 13 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.report_type == 'market_open' || github.event.inputs.report_type == 'all'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market open flash report
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
          SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
          SNAPTRADE_USER_ID: ${{ secrets.SNAPTRADE_USER_ID }}
          SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
        run: python market_open.py

  eod-flash-report:
    runs-on: ubuntu-latest
    if: >-
      (github.event.schedule == '0 19 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.report_type == 'eod_flash' || github.event.inputs.report_type == 'all'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOD flash report
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
          SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
          SNAPTRADE_USER_ID: ${{ secrets.SNAPTRADE_USER_ID }}
          SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
        run: python eod_flash.py
